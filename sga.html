<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAC Engage — SGA Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/admin.css">
<style>
  #sga-sidebar-user, .sidebar { background: #2a1f5a; }
  .nav-item.active { background:rgba(200,181,96,0.15);color:#c8b560; }
  .nav-item.active i { color:#c8b560; }
  .nav-badge { background:#533AB7;color:#EEEDFE; }
  .nav-section-label { color:rgba(255,255,255,0.25); }
  .nav-item { color:rgba(255,255,255,0.55); }
  .nav-item:hover { background:rgba(255,255,255,0.07);color:#fff; }
</style>
</head>
<body class="app-page">
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-seal sm" style="background:#533AB7;"><div class="seal-inner" style="color:#EEEDFE;font-size:10px;font-family:var(--font-body);">SGA</div></div>
      <div>
        <div class="brand-name sm">SGA Portal</div>
        <div style="font-size:9px;color:#c8b560;letter-spacing:.08em;text-transform:uppercase;margin-top:1px;">STAC Engage</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sga-nav"></nav>
    <div class="sidebar-user" id="sga-sidebar-user"></div>
  </aside>
  <div class="app-main">
    <header class="app-header">
      <div class="header-left">
        <button class="hamburger" onclick="toggleSidebar()"><i class="ti ti-menu-2"></i></button>
        <div id="sga-header-title" class="header-title">SGA Overview</div>
      </div>
      <div class="header-right">
        <span style="font-size:11px;background:#EEEDFE;color:#533AB7;padding:4px 10px;border-radius:999px;font-weight:500;"><i class="ti ti-star" style="font-size:11px;"></i> SGA</span>
        <a href="index.html" style="font-size:12px;color:#5a5a52;display:flex;align-items:center;gap:5px;padding:6px 10px;border:1px solid var(--border-md);border-radius:8px;text-decoration:none;"><i class="ti ti-arrow-left" style="font-size:13px;"></i> Login</a>
      </div>
    </header>
    <main class="app-content" id="sga-content"></main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/portal-auth.js"></script>
<script src="js/data.js"></script>
<script src="js/spaces-data.js"></script>
<script src="js/admin-data.js"></script>
<script src="js/sga/tabs.js"></script>
<script src="js/sga/app.js"></script>
</body>
</html>
