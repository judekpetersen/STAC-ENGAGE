<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAC Engage</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6b1a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="STAC Engage">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144.png">
<link rel="apple-touch-icon" sizes="128x128" href="icons/icon-128.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/main.css">
</head>
<body class="app-page">

<div class="app-shell">
  <aside class="sidebar" role="navigation" aria-label="Main navigation">
    <div class="sidebar-brand">
      <div class="brand-seal sm"><div class="seal-inner">S</div></div>
      <div>
        <div class="brand-name sm">STAC Engage</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-user" id="sidebar-user"></div>
  </aside>

  <div class="app-main">
    <header class="app-header" id="app-header">
      <div class="header-left">
        <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
          <i class="ti ti-menu-2"></i>
        </button>
        <div id="header-title" class="header-title">Dashboard</div>
      </div>
      <div class="header-right">
        <div class="header-score" id="header-score">
          <i class="ti ti-star"></i>
          <span id="score-display">847</span>
        </div>
        <button class="icon-btn" aria-label="Messages" onclick="switchTab('messages')">
          <i class="ti ti-message-circle"></i>
          <span class="notif-dot"></span>
        </button>
        <button class="icon-btn notif-btn" aria-label="Notifications" onclick="switchTab('notifications')">
          <i class="ti ti-bell"></i>
          <span class="notif-dot"></span>
        </button>
        <div class="header-avatar" id="header-avatar" onclick="switchTab('profile')">JM</div>
      </div>
    </header>
    <main class="app-content" id="app-content" role="main" aria-live="polite"></main>
  </div>
</div>

<!-- Core -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/data.js"></script>
<!-- spaces-data loaded separately -->
<script src="js/spaces-data.js"></script>
<script src="js/state.js"></script>
<script src="js/components.js"></script>
<!-- Tab renderers -->
<script src="js/tabs/dashboard.js"></script>
<script src="js/tabs/events.js"></script>
<script src="js/tabs/calendar.js"></script>
<script src="js/tabs/map.js"></script>
<script src="js/tabs/transcript.js"></script>
<script src="js/tabs/pathways.js"></script>
<script src="js/tabs/leaderboard.js"></script>
<script src="js/tabs/streaks.js"></script>
<script src="js/tabs/shop.js"></script>
<script src="js/tabs/feed.js"></script>
<script src="js/tabs/orgs.js"></script>
<script src="js/tabs/clubvclub.js"></script>
<script src="js/tabs/profile.js"></script>
<script src="js/tabs/service.js"></script>
<script src="js/tabs/notifications.js"></script>
<script src="js/tabs/feedback.js"></script>
<script src="js/tabs/messages.js"></script>
<script src="js/tabs/settings.js"></script>
<script src="js/tabs/tickets.js"></script>
<!-- App init -->
<script src="js/app-v2.js"></script>
<div class="bottom-nav" id="bottom-nav"></div>
<script src="js/pwa.js"></script>
</body>
</html>
